services:
  blog:
    image: nginx:alpine
    container_name: blog-familiar
    restart: unless-stopped
    ports:
      - "8090:80"
      - "8091:81"
    volumes:
      - ./blog-content/public:/usr/share/nginx/html:ro,z
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx:/etc/nginx/auth:ro,z
    depends_on:
      hugo-init:
        condition: service_completed_successfully
    networks:
      - blog-network

  hugo-init:
    image: klakegg/hugo:ext-alpine
    container_name: hugo-init
    volumes:
      - ./blog-content:/src:z
    working_dir: /src
    command: ["--minify"]
    networks:
      - blog-network

  api-bot:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hearthlog-api
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - ./blog-content:/blog-content:z
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AI_BOT_API_TOKEN=${AI_BOT_API_TOKEN}
      - BLOG_CONTENT_PATH=/blog-content
    networks:
      - blog-network

  htpasswd-gen:
    image: httpd:alpine
    container_name: htpasswd-gen
    restart: "no"
    volumes:
      - ./nginx:/output
    environment:
      - BLOG_PASSWORD=${BLOG_PASSWORD}
    command: >
      sh -c "htpasswd -Bbn familia $$BLOG_PASSWORD > /output/auth.htpasswd && echo 'htpasswd generated'"
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
