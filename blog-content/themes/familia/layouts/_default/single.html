{{ define "main" }}
<article>
  <header class="post-header">
    <p class="post-date">{{ .Date.Format "2 January 2006" }}</p>
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  {{ with .Params.featured_image }}
  <img class="post-featured" src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
  {{ end }}

  <div class="post-body">
    {{ .Content }}
  </div>

  <nav class="post-nav">
    {{ with .PrevInSection }}
    <a href="{{ .Permalink }}">← {{ .Title }}</a>
    {{ else }}<span></span>{{ end }}
    {{ with .NextInSection }}
    <a href="{{ .Permalink }}">{{ .Title }} →</a>
    {{ end }}
  </nav>
</article>
{{ end }}
